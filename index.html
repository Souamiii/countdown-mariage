<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lora:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    
    
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .countdown {
    display: flex;
    gap: clamp(1rem, 2vw, 1.8rem);
    justify-content: center;
    align-items: stretch;
    flex-wrap: wrap;
    padding: 2rem;
  }

  .block {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 8px;
    width: clamp(130px, 18vw, 220px);
    aspect-ratio: 1 / 0.9;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.7rem;
    padding: 1.5rem 1rem;
  }

  .number {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 60px;
    line-height: 1;
    color: #fff;
    text-align: center;
  }

  .unit {
    font-family: 'Lora', serif;
    font-weight: 400;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.8);
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <div class="countdown">
    <div class="block">
      <span class="number" id="days">0</span>
      <span class="unit">Jour</span>
    </div>
    <div class="block">
      <span class="number" id="hours">00</span>
      <span class="unit">Heures</span>
    </div>
    <div class="block">
      <span class="number" id="mins">00</span>
      <span class="unit">Minutes</span>
    </div>
    <div class="block">
      <span class="number" id="secs">00</span>
      <span class="unit">Secondes</span>
    </div>
  </div>

<script>
  const WEDDING = new Date('2026-05-15T12:00:00');

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const diff = WEDDING - new Date();
    if (diff <= 0) {
      document.getElementById('days').textContent  = '0';
      document.getElementById('hours').textContent = '00';
      document.getElementById('mins').textContent  = '00';
      document.getElementById('secs').textContent  = '00';
      return;
    }
    const days  = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins  = Math.floor((diff % 3600000)  /   60000);
    const secs  = Math.floor((diff %   60000)  /    1000);

    document.getElementById('days').textContent  = String(days);
    document.getElementById('hours').textContent = pad(hours);
    document.getElementById('mins').textContent  = pad(mins);
    document.getElementById('secs').textContent  = pad(secs);
  }

  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
